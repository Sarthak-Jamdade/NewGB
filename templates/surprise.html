<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Good Bye 💖</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --rose: #ff4b6e;
            --cyan: #00e5ff;
            --gold: #ffd166;
            --violet: #a855f7;
            --pink: #f472b6;
            --white: #ffffff;
            --bg: #050510;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            overflow: hidden;
            font-family: 'DM Sans', sans-serif;
            color: var(--white);
            cursor: none;
        }

        /* ── Custom cursor ── */
        #cursor {
            position: fixed;
            width: 18px;
            height: 18px;
            border: 2px solid var(--cyan);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transition: transform .15s ease, background .2s;
            mix-blend-mode: screen;
        }

        #cursor.big {
            transform: scale(3);
            background: rgba(0, 229, 255, .15);
        }

        /* ── Star canvas ── */
        #bg {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        /* ── Aurora blobs ── */
        .aurora {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: .35;
            animation: drift 14s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 1;
        }

        .aurora-1 {
            width: 700px;
            height: 500px;
            background: var(--violet);
            top: -15%;
            left: -15%;
            animation-delay: 0s;
        }

        .aurora-2 {
            width: 600px;
            height: 600px;
            background: var(--rose);
            bottom: -20%;
            right: -10%;
            animation-delay: -5s;
        }

        .aurora-3 {
            width: 500px;
            height: 400px;
            background: var(--cyan);
            top: 30%;
            left: 40%;
            animation-delay: -9s;
        }

        @keyframes drift {
            from {
                transform: translate(0, 0) scale(1);
            }

            to {
                transform: translate(60px, 40px) scale(1.15);
            }
        }

        /* ── INTRO ── */
        #intro {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 18px;
            transition: opacity 1s ease, visibility 1s ease;
        }

        #intro.hide {
            opacity: 0;
            visibility: hidden;
        }

        .intro-line {
            font-family: 'Playfair Display', serif;
            font-size: clamp(22px, 4vw, 48px);
            letter-spacing: .06em;
            opacity: 0;
            transform: translateY(30px);
            animation: slideUp .9s forwards;
        }

        .intro-line:nth-child(2) {
            animation-delay: .7s;
            font-style: italic;
            font-size: clamp(14px, 2.5vw, 24px);
            color: var(--cyan);
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: none;
            }
        }

        .intro-bar {
            width: 220px;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--cyan), var(--rose), transparent);
            margin-top: 10px;
            animation: barGrow 2s 1.2s ease forwards;
            transform: scaleX(0);
            transform-origin: left;
        }

        @keyframes barGrow {
            to {
                transform: scaleX(1);
            }
        }

        /* ── MAIN STAGE ── */
        #stage {
            position: relative;
            z-index: 5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            opacity: 0;
            transition: opacity 1.2s ease;
        }

        #stage.show {
            opacity: 1;
        }

        /* ── Title ── */
        #title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(64px, 12vw, 130px);
            line-height: 1;
            background: linear-gradient(135deg, var(--rose) 0%, var(--gold) 40%, var(--cyan) 70%, var(--violet) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            background-size: 300% 300%;
            animation: shiftGrad 5s ease infinite;
            filter: drop-shadow(0 0 40px rgba(255, 75, 110, .45));
        }

        @keyframes shiftGrad {

            0%,
            100% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }
        }

        #subtitle {
            font-size: clamp(13px, 2vw, 18px);
            letter-spacing: .35em;
            text-transform: uppercase;
            color: var(--gold);
            opacity: 0;
            animation: fadeIn 1s 1s forwards;
        }

        #message {
            max-width: min(680px, 90vw);
            text-align: center;
            font-size: clamp(16px, 2.2vw, 22px);
            line-height: 1.8;
            color: rgba(255, 255, 255, .88);
            font-weight: 300;
            min-height: 3em;
        }

        #cursor-blink {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: var(--cyan);
            vertical-align: middle;
            margin-left: 3px;
            animation: blink .7s steps(1) infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0
            }
        }

        /* ── Button row ── */
        .btn-row {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 8px;
        }

        .btn {
            padding: 14px 32px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 400;
            letter-spacing: .06em;
            position: relative;
            overflow: hidden;
            transition: transform .25s, box-shadow .25s;
        }

        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, .12);
            opacity: 0;
            transition: opacity .25s;
        }

        .btn:hover::before {
            opacity: 1;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.04);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--rose), var(--violet));
            color: #fff;
            box-shadow: 0 4px 30px rgba(168, 85, 247, .4);
        }

        .btn-primary:hover {
            box-shadow: 0 8px 50px rgba(168, 85, 247, .7);
        }

        .btn-secondary {
            background: transparent;
            border: 1.5px solid rgba(0, 229, 255, .5);
            color: var(--cyan);
        }

        .btn-secondary:hover {
            box-shadow: 0 0 30px rgba(0, 229, 255, .3);
        }

        /* ══════════════════════════════════
       LAST SURPRISE BUTTON — SPECIAL
    ══════════════════════════════════ */
        .btn-surprise {
            position: relative;
            background: transparent;
            border: none;
            padding: 0;
            cursor: pointer;
            outline: none;
        }

        /* Animated gradient border ring */
        .surprise-outer {
            position: relative;
            padding: 2px;
            border-radius: 50px;
            background: linear-gradient(135deg, var(--rose), var(--gold), var(--cyan), var(--violet), var(--rose));
            background-size: 300% 300%;
            animation: borderFlow 3s linear infinite;
            box-shadow:
                0 0 20px rgba(255, 75, 110, .5),
                0 0 40px rgba(168, 85, 247, .35),
                0 0 60px rgba(0, 229, 255, .2);
            animation: borderFlow 3s linear infinite, surpriseGlow 2s ease-in-out infinite alternate;
        }

        @keyframes borderFlow {
            0% {
                background-position: 0% 50%;
            }

            100% {
                background-position: 300% 50%;
            }
        }

        @keyframes surpriseGlow {
            from {
                box-shadow: 0 0 20px rgba(255, 75, 110, .5), 0 0 40px rgba(168, 85, 247, .35), 0 0 60px rgba(0, 229, 255, .2);
            }

            to {
                box-shadow: 0 0 40px rgba(255, 75, 110, .8), 0 0 80px rgba(168, 85, 247, .6), 0 0 100px rgba(0, 229, 255, .4);
            }
        }

        .surprise-inner {
            background: linear-gradient(135deg, #0d0020, #050510, #001020);
            border-radius: 48px;
            padding: 16px 38px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 400;
            letter-spacing: .08em;
            color: var(--white);
            transition: background .3s;
        }

        .btn-surprise:hover .surprise-inner {
            background: linear-gradient(135deg, #1a003a, #0a0020, #001830);
        }

        /* Sparkle icon that rotates */
        .surprise-icon {
            font-size: 18px;
            display: inline-block;
            animation: spinIcon 4s linear infinite;
        }

        @keyframes spinIcon {
            0% {
                transform: rotate(0deg) scale(1);
            }

            50% {
                transform: rotate(180deg) scale(1.3);
            }

            100% {
                transform: rotate(360deg) scale(1);
            }
        }

        /* Orbiting dot on the border */
        .surprise-orbit {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            border-radius: 50px;
            animation: orbitRound 3s linear infinite;
            pointer-events: none;
        }

        .surprise-orbit::before {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: var(--white);
            border-radius: 50%;
            top: -4px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 8px var(--cyan), 0 0 16px var(--cyan);
        }

        @keyframes orbitRound {
            to {
                transform: rotate(360deg);
            }
        }

        /* Rings */
        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, .06);
            animation: spinSlow linear infinite;
            pointer-events: none;
        }

        .ring-1 {
            width: 420px;
            height: 420px;
            animation-duration: 28s;
        }

        .ring-2 {
            width: 620px;
            height: 620px;
            animation-duration: 42s;
            animation-direction: reverse;
        }

        .ring-3 {
            width: 820px;
            height: 820px;
            animation-duration: 60s;
            border-color: rgba(0, 229, 255, .04);
        }

        @keyframes spinSlow {
            to {
                transform: rotate(360deg);
            }
        }

        .ring-dot {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--cyan);
            top: -3px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 10px var(--cyan);
        }

        /* Floating hearts */
        .heart {
            position: fixed;
            font-size: clamp(16px, 3vw, 28px);
            pointer-events: none;
            animation: floatUp 7s ease-in forwards;
            z-index: 3;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg) scale(1);
                opacity: 1;
            }

            80% {
                opacity: .8;
            }

            100% {
                transform: translateY(-105vh) rotate(20deg) scale(1.4);
                opacity: 0;
            }
        }

        /* Sparks */
        .spark {
            position: fixed;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            pointer-events: none;
            animation: sparkFade 1.6s ease-out forwards;
            z-index: 3;
        }

        @keyframes sparkFade {
            0% {
                opacity: 1;
                transform: scale(1)
            }

            100% {
                opacity: 0;
                transform: scale(4)
            }
        }

        /* Ripple */
        .ripple {
            position: fixed;
            left: 50%;
            top: 50%;
            width: 30px;
            height: 30px;
            margin: -15px 0 0 -15px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, .8);
            animation: rippleOut 1.2s cubic-bezier(.2, .8, .4, 1) forwards;
            pointer-events: none;
            z-index: 4;
        }

        @keyframes rippleOut {
            to {
                transform: scale(20);
                opacity: 0;
            }
        }

        /* ══════════════════════════════════════════════
       THE LAST SURPRISE MODAL — FULL CINEMATIC
    ══════════════════════════════════════════════ */
        #surpriseModal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 500;
            place-items: center;
        }

        #surpriseModal.active {
            display: grid;
        }

        /* Backdrop with animated radial pulse */
        .modal-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(5, 5, 16, .96);
            backdrop-filter: blur(28px);
            animation: backdropIn .5s ease forwards;
        }

        @keyframes backdropIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        /* Outer glow ring before card appears */
        .modal-glow-ring {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            border: 1px solid rgba(168, 85, 247, .15);
            animation: glowRingPulse 3s ease-in-out infinite;
            pointer-events: none;
        }

        .modal-glow-ring-2 {
            width: 900px;
            height: 900px;
            border-color: rgba(0, 229, 255, .08);
            animation-delay: -1.5s;
        }

        @keyframes glowRingPulse {

            0%,
            100% {
                transform: scale(1);
                opacity: .5;
            }

            50% {
                transform: scale(1.06);
                opacity: 1;
            }
        }

        /* Card */
        .modal-card {
            position: relative;
            z-index: 10;
            width: min(580px, 94vw);
            border-radius: 30px;
            overflow: hidden;
            animation: cardLand .8s cubic-bezier(.16, 1, .3, 1) .1s both;
        }

        @keyframes cardLand {
            from {
                transform: scale(.6) translateY(80px) rotate(-3deg);
                opacity: 0;
            }

            to {
                transform: scale(1) translateY(0) rotate(0deg);
                opacity: 1;
            }
        }

        /* Animated gradient border */
        .modal-card-border {
            position: absolute;
            inset: -3px;
            border-radius: 32px;
            z-index: -1;
            background: linear-gradient(135deg, var(--rose), var(--violet), var(--gold), var(--cyan), var(--rose));
            background-size: 400% 400%;
            animation: borderSpin 4s linear infinite;
        }

        @keyframes borderSpin {
            0% {
                background-position: 0% 50%
            }

            100% {
                background-position: 400% 50%
            }
        }

        /* Card body */
        .modal-body {
            background: linear-gradient(160deg, #0f0520, #080314, #050218);
            border-radius: 30px;
            padding: 62px 52px 52px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Inner shimmer */
        .modal-body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% -10%, rgba(168, 85, 247, .18) 0%, transparent 60%);
            pointer-events: none;
        }

        /* Spinning rings inside modal */
        .m-ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, .04);
            animation: spinSlow linear infinite;
            pointer-events: none;
        }

        .m-ring-1 {
            width: 400px;
            height: 400px;
            top: 50%;
            left: 50%;
            margin: -200px 0 0 -200px;
            animation-duration: 25s;
        }

        .m-ring-2 {
            width: 600px;
            height: 600px;
            top: 50%;
            left: 50%;
            margin: -300px 0 0 -300px;
            animation-duration: 45s;
            animation-direction: reverse;
            border-color: rgba(0, 229, 255, .04);
        }

        /* Close button */
        .modal-close {
            position: absolute;
            top: 20px;
            right: 22px;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 255, 255, .1);
            color: rgba(255, 255, 255, .4);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .2s, color .2s;
        }

        .modal-close:hover {
            background: rgba(255, 75, 110, .25);
            color: #fff;
        }

        /* Big icon with particle burst */
        .modal-icon-wrap {
            position: relative;
            display: inline-block;
            margin-bottom: 24px;
        }

        .modal-icon {
            font-size: 80px;
            display: inline-block;
            animation: iconPop .9s .3s cubic-bezier(.2, .8, .2, 1.5) both;
        }

        @keyframes iconPop {
            from {
                transform: scale(0) rotate(-25deg);
                opacity: 0;
            }

            60% {
                transform: scale(1.3) rotate(6deg);
            }

            to {
                transform: scale(1) rotate(0);
                opacity: 1;
            }
        }

        /* Orbiting emojis around icon */
        .icon-orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            animation: orbitIcon linear infinite;
            pointer-events: none;
        }

        .io1 {
            width: 100px;
            height: 100px;
            margin: -50px 0 0 -50px;
            animation-duration: 2.5s;
        }

        .io2 {
            width: 140px;
            height: 140px;
            margin: -70px 0 0 -70px;
            animation-duration: 4s;
            animation-direction: reverse;
        }

        .io3 {
            width: 80px;
            height: 80px;
            margin: -40px 0 0 -40px;
            animation-duration: 1.8s;
            animation-delay: -.9s;
        }

        @keyframes orbitIcon {
            to {
                transform: rotate(360deg);
            }
        }

        .orbit-emoji {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
        }

        /* Particle burst ring (CSS only) */
        .particle-burst {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            pointer-events: none;
        }

        .pb {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            animation: particleFly 1.2s .3s ease-out both;
        }

        @keyframes particleFly {
            from {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }

            to {
                opacity: 0;
                transform: scale(.3);
            }
        }

        /* Modal title */
        .modal-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(28px, 5vw, 42px);
            line-height: 1.15;
            background: linear-gradient(135deg, #fff 0%, var(--pink) 35%, var(--gold) 70%, var(--cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% 200%;
            animation: shiftGrad 4s ease infinite, fadeUp .7s .5s both;
            margin-bottom: 10px;
        }

        .modal-sub {
            font-size: 11px;
            letter-spacing: .4em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 28px;
            animation: fadeUp .6s .65s both;
        }

        /* Divider */
        .modal-divider {
            width: 0;
            height: 1px;
            margin: 0 auto 28px;
            background: linear-gradient(90deg, transparent, var(--pink), var(--cyan), transparent);
            animation: dividerGrow .8s .7s ease forwards;
        }

        @keyframes dividerGrow {
            to {
                width: 220px;
            }
        }

        /* Typed message */
        #mTyped {
            font-size: clamp(15px, 2vw, 18px);
            line-height: 1.9;
            color: rgba(255, 255, 255, .82);
            font-weight: 300;
            min-height: 4.5em;
            margin-bottom: 38px;
            animation: fadeIn .5s .8s both;
            font-style: italic;
        }

        #mCursor {
            display: inline-block;
            width: 1.5px;
            height: 1em;
            background: var(--pink);
            vertical-align: middle;
            margin-left: 2px;
            animation: blink .65s steps(1) infinite;
        }

        /* Modal buttons */
        .modal-btns {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeUp .6s .9s both;
        }

        /* ── Floating click sparks ── */
        .cspark {
            position: fixed;
            pointer-events: none;
            font-size: 18px;
            z-index: 6;
            animation: csparkOut .7s ease-out forwards;
        }

        @keyframes csparkOut {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1
            }

            100% {
                transform: translate(-50%, -50%) scale(2.8);
                opacity: 0
            }
        }

        /* ── Utils ── */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(18px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        @media (max-width:480px) {
            .ring-1 {
                width: 280px;
                height: 280px
            }

            .ring-2 {
                width: 400px;
                height: 400px
            }

            .ring-3 {
                width: 540px;
                height: 540px
            }

            .modal-body {
                padding: 50px 28px 40px
            }
        }

        /* ══════════════════════════════
   RESPONSIVE MEDIA QUERIES
══════════════════════════════ */

        /* Tablet — 768px */
        @media (max-width: 768px) {
            #title {
                font-size: clamp(52px, 13vw, 90px);
            }

            #subtitle {
                font-size: 13px;
                letter-spacing: .25em;
            }

            #message {
                font-size: clamp(15px, 2.5vw, 19px);
            }

            .btn-row {
                gap: 12px;
            }

            .btn {
                padding: 13px 26px;
                font-size: 14px;
            }

            .surprise-inner {
                padding: 14px 28px;
                font-size: 14px;
            }

            .ring-1 {
                width: 320px;
                height: 320px;
            }

            .ring-2 {
                width: 480px;
                height: 480px;
            }

            .ring-3 {
                width: 640px;
                height: 640px;
            }

            .modal-body {
                padding: 52px 38px 44px;
            }

            .modal-icon {
                font-size: 64px;
            }

            .modal-title {
                font-size: clamp(24px, 4.5vw, 36px);
            }

            #mTyped {
                font-size: 15px;
                min-height: 3.5em;
            }

            .m-ring-1 {
                width: 300px;
                height: 300px;
                margin: -150px 0 0 -150px;
            }

            .m-ring-2 {
                width: 460px;
                height: 460px;
                margin: -230px 0 0 -230px;
            }

            .modal-glow-ring {
                width: 420px;
                height: 420px;
            }

            .modal-glow-ring-2 {
                width: 640px;
                height: 640px;
            }
        }

        /* Mobile — 480px */
        @media (max-width: 480px) {
            body {
                overflow-x: hidden;
            }

            /* Rings shrink */
            .ring-1 {
                width: 240px;
                height: 240px;
            }

            .ring-2 {
                width: 360px;
                height: 360px;
            }

            .ring-3 {
                width: 500px;
                height: 500px;
            }

            /* Intro */
            .intro-line {
                font-size: clamp(18px, 5vw, 28px);
            }

            .intro-bar {
                width: 160px;
            }

            /* Stage */
            #stage {
                gap: 14px;
                padding: 0 16px;
            }

            #title {
                font-size: clamp(44px, 14vw, 70px);
            }

            #subtitle {
                font-size: 11px;
                letter-spacing: .2em;
            }

            #message {
                font-size: clamp(14px, 3.5vw, 17px);
                line-height: 1.75;
            }

            /* Buttons stack vertically */
            .btn-row {
                flex-direction: column;
                align-items: center;
                gap: 10px;
                width: 100%;
                padding: 0 24px;
            }

            .btn {
                width: 100%;
                max-width: 280px;
                font-size: 13px;
                padding: 13px 20px;
            }

            /* Surprise button full width */
            .btn-surprise {
                width: 100%;
                max-width: 280px;
            }

            .surprise-outer {
                width: 100%;
            }

            .surprise-inner {
                padding: 13px 20px;
                font-size: 13px;
                justify-content: center;
                width: 100%;
            }

            .surprise-icon {
                font-size: 15px;
            }

            /* Modal */
            .modal-card {
                width: 96vw;
                border-radius: 22px;
            }

            .modal-body {
                padding: 44px 20px 34px;
                border-radius: 22px;
            }

            .modal-close {
                top: 14px;
                right: 14px;
                width: 28px;
                height: 28px;
                font-size: 13px;
            }

            .modal-icon {
                font-size: 52px;
            }

            .io1 {
                width: 72px;
                height: 72px;
                margin: -36px 0 0 -36px;
            }

            .io2 {
                width: 100px;
                height: 100px;
                margin: -50px 0 0 -50px;
            }

            .io3 {
                width: 58px;
                height: 58px;
                margin: -29px 0 0 -29px;
            }

            .modal-title {
                font-size: clamp(20px, 5.5vw, 28px);
            }

            .modal-sub {
                font-size: 9px;
                letter-spacing: .25em;
                margin-bottom: 18px;
            }

            .modal-divider {
                margin-bottom: 18px;
            }

            #mTyped {
                font-size: 13px;
                line-height: 1.8;
                min-height: 3em;
                margin-bottom: 26px;
            }

            .modal-btns {
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }

            .modal-btns .btn {
                width: 100%;
                max-width: 240px;
                font-size: 12px;
            }

            .m-ring-1 {
                width: 230px;
                height: 230px;
                margin: -115px 0 0 -115px;
            }

            .m-ring-2 {
                width: 350px;
                height: 350px;
                margin: -175px 0 0 -175px;
            }

            .modal-glow-ring {
                width: 300px;
                height: 300px;
            }

            .modal-glow-ring-2 {
                width: 480px;
                height: 480px;
            }
        }

        /* Very small — 360px */
        @media (max-width: 360px) {
            #title {
                font-size: 38px;
            }

            #message {
                font-size: 13px;
            }

            .btn {
                max-width: 260px;
                font-size: 12px;
                padding: 12px 16px;
            }

            .btn-surprise {
                max-width: 260px;
            }

            .surprise-inner {
                font-size: 12px;
                padding: 12px 16px;
            }

            .modal-body {
                padding: 38px 16px 28px;
            }

            .modal-title {
                font-size: 19px;
            }

            #mTyped {
                font-size: 12px;
            }

            .io1 {
                width: 60px;
                height: 60px;
                margin: -30px 0 0 -30px;
            }

            .io2 {
                width: 84px;
                height: 84px;
                margin: -42px 0 0 -42px;
            }
        }
    </style>
</head>

<body>

    <div id="cursor"></div>
    <div class="aurora aurora-1"></div>
    <div class="aurora aurora-2"></div>
    <div class="aurora aurora-3"></div>
    <canvas id="bg"></canvas>

    <!-- INTRO -->
    <div id="intro">
        <p class="intro-line">✨ Preparing Something Special</p>
        <p class="intro-line">Just for you...</p>
        <div class="intro-bar"></div>
    </div>

    <!-- MAIN STAGE -->
    <div id="stage">
        <div class="ring ring-3">
            <div class="ring-dot" style="background:var(--violet);box-shadow:0 0 10px var(--violet)"></div>
        </div>
        <div class="ring ring-2">
            <div class="ring-dot"></div>
        </div>
        <div class="ring ring-1">
            <div class="ring-dot" style="background:var(--rose);box-shadow:0 0 10px var(--rose)"></div>
        </div>

        <p id="subtitle">A Message From The Heart</p>
        <h1 id="title">Good Bye</h1>
        <p id="message"><span id="cursor-blink"></span></p>

        <div class="btn-row">
            <button class="btn btn-primary" id="startBtn" onclick="start()">✨ Start Experience</button>
            <button class="btn btn-secondary" onclick="location.reload()">🔄 Replay</button>

            <!-- ✦ THE LAST SURPRISE BUTTON ✦ -->
            <button class="btn-surprise" id="surpriseBtn" onclick="openSurprise(event)">
                <div class="surprise-outer">
                    <div class="surprise-orbit"></div>
                    <div class="surprise-inner">
                        <span class="surprise-icon">✦</span>
                        Last Surprise
                        <span class="surprise-icon" style="animation-delay:-.5s">✦</span>
                    </div>
                </div>
            </button>
        </div>
    </div>

    <audio id="music" loop>
        <source src="/static/music/birthday.mp3" type="audio/mpeg" />
    </audio>

    <!-- ══════════════════════════════════════
     THE LAST SURPRISE MODAL
══════════════════════════════════════ -->
    <div id="surpriseModal" onclick="handleModalBg(event)">
        <div class="modal-backdrop"></div>

        <!-- Ambient glow rings -->
        <div class="modal-glow-ring"></div>
        <div class="modal-glow-ring modal-glow-ring-2"></div>

        <div class="modal-card" id="modalCard">
            <div class="modal-card-border"></div>
            <div class="modal-body">

                <!-- Inner spinning rings -->
                <div class="m-ring m-ring-1"></div>
                <div class="m-ring m-ring-2"></div>

                <!-- Close -->
                <button class="modal-close" onclick="closeSurprise()">✕</button>

                <!-- Icon + orbits + particles -->
                <div class="modal-icon-wrap" id="iconWrap">
                    <!-- Orbiting emojis -->
                    <div class="icon-orbit io1"><span class="orbit-emoji">🌸</span></div>
                    <div class="icon-orbit io2"><span class="orbit-emoji">💫</span></div>
                    <div class="icon-orbit io3"><span class="orbit-emoji">✨</span></div>

                    <!-- Particle burst -->
                    <div class="particle-burst" id="burstRing"></div>

                    <div class="modal-icon">💖</div>
                </div>

                <h2 class="modal-title">One Last Thing</h2>
                <p class="modal-sub">✦ from my heart to yours ✦</p>
                <div class="modal-divider"></div>

                <p id="mTyped"><span id="mCursor"></span></p>

                <div class="modal-btns">
                    <button class="btn btn-primary" onclick="window.location.href='/lastsurprise'">Click For Last
                        Surprise</button>
                    <button class="btn btn-secondary" onclick="replayModal()">read again ↺</button>
                </div>

            </div>
        </div>
    </div>

    <script>
        /* ── Cursor ── */
        const cur = document.getElementById('cursor');
        document.addEventListener('mousemove', e => {
            cur.style.left = e.clientX - 9 + 'px';
            cur.style.top = e.clientY - 9 + 'px';
        });
        document.querySelectorAll('button, .btn-surprise').forEach(b => {
            b.addEventListener('mouseenter', () => cur.classList.add('big'));
            b.addEventListener('mouseleave', () => cur.classList.remove('big'));
        });

        /* ── Star field ── */
        const canvas = document.getElementById('bg'), ctx = canvas.getContext('2d');
        let W, H, stars = [];
        function resize() {
            W = canvas.width = innerWidth; H = canvas.height = innerHeight;
            stars = Array.from({ length: 300 }, () => ({
                x: Math.random() * W, y: Math.random() * H,
                r: Math.random() * 1.8 + .3, speed: Math.random() * .4 + .1, opacity: Math.random()
            }));
        }
        resize(); window.addEventListener('resize', resize);
        function drawStars() {
            ctx.clearRect(0, 0, W, H);
            stars.forEach(s => {
                s.opacity += (Math.random() - .5) * .04;
                s.opacity = Math.min(1, Math.max(.05, s.opacity));
                ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${s.opacity})`; ctx.fill();
                s.y += s.speed;
                if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
            });
            requestAnimationFrame(drawStars);
        }
        drawStars();

        /* ── Intro transition ── */
        setTimeout(() => {
            document.getElementById('intro').classList.add('hide');
            setTimeout(() => document.getElementById('stage').classList.add('show'), 600);
        }, 3200);

        /* ── Main start ── */
        let started = false;
        function start() {
            if (started) return; started = true;
            document.getElementById('startBtn').style.opacity = '.4';
            document.getElementById('startBtn').disabled = true;
            fadeMusic(); typeText(); fireworks(); hearts(); sparks(); shockwave();
        }

        /* ── Music ── */
        function fadeMusic() {
            const m = document.getElementById('music');
            m.volume = 0; m.play().catch(() => { });
            let v = 0;
            const iv = setInterval(() => {
                v = Math.min(v + .02, .55); m.volume = v;
                if (v >= .55) clearInterval(iv);
            }, 180);
        }

        /* ── Typewriter (main) ── */
        function typeText() {
            const full = "You are not just my best friend — you are my family 💖 Thank you for every laugh, every memory, and everything in between ❤️";
            const el = document.getElementById('message');
            const blink = document.getElementById('cursor-blink');
            let i = 0; el.innerHTML = ''; el.appendChild(blink);
            const iv = setInterval(() => {
                if (i < full.length) { blink.insertAdjacentText('beforebegin', full[i]); i++; }
                else { clearInterval(iv); setTimeout(() => blink.remove(), 1200); }
            }, 38);
        }

        /* ── Fireworks ── */
        function fireworks() {
            const colors = ['#ff4b6e', '#00e5ff', '#ffd166', '#a855f7', '#ffffff'];
            const fire = () => confetti({ particleCount: 120 + Math.random() * 80, spread: 160, startVelocity: 40 + Math.random() * 20, colors, origin: { x: Math.random(), y: Math.random() * .45 }, scalar: 1.1 });
            fire(); setTimeout(fire, 600);
            const iv = setInterval(fire, 1800); setTimeout(() => clearInterval(iv), 30000);
        }

        /* ── Hearts ── */
        function hearts() {
            const emojis = ['💖', '💙', '❤️', '💛', '💜', '🩷'];
            const spawn = () => {
                const h = document.createElement('div'); h.className = 'heart';
                h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                h.style.left = Math.random() * 100 + 'vw'; h.style.bottom = '-60px';
                h.style.animationDuration = 5 + Math.random() * 4 + 's';
                document.body.appendChild(h); setTimeout(() => h.remove(), 9000);
            };
            const iv = setInterval(spawn, 280); setTimeout(() => clearInterval(iv), 30000);
        }

        /* ── Sparks ── */
        function sparks() {
            const colors = ['#ff4b6e', '#00e5ff', '#ffd166', '#a855f7'];
            const spawn = () => {
                const s = document.createElement('div'); s.className = 'spark';
                s.style.left = Math.random() * 100 + 'vw'; s.style.top = Math.random() * 100 + 'vh';
                s.style.background = colors[Math.floor(Math.random() * colors.length)];
                document.body.appendChild(s); setTimeout(() => s.remove(), 1600);
            };
            const iv = setInterval(spawn, 120); setTimeout(() => clearInterval(iv), 30000);
        }

        /* ── Shockwave ── */
        function shockwave() {
            const r = document.createElement('div'); r.className = 'ripple';
            document.body.appendChild(r); setTimeout(() => r.remove(), 1200);
        }

        /* ════════════════════════════════
           LAST SURPRISE MODAL
        ════════════════════════════════ */
        const surpriseMsg = "I kept this for last because it matters most. Through every hall we walked, every laugh we shared, every quiet moment — you have been the most beautiful part of this story. College ends today, but what we have? That has no ending. You are my favourite memory and my brightest tomorrow. I love you. Always. 🌸";

        let modalOpen = false;

        function openSurprise(e) {
            if (modalOpen) return;
            modalOpen = true;

            /* Click sparks at button */
            spawnClickSparks(e);

            /* Show modal */
            const modal = document.getElementById('surpriseModal');
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';

            /* Build particle burst */
            buildParticles();

            /* Type message */
            setTimeout(() => typeModal(surpriseMsg), 600);

            /* Extra confetti burst */
            setTimeout(() => {
                const colors = ['#ff4b6e', '#f472b6', '#ffd166', '#a855f7', '#00e5ff', '#fff'];
                confetti({ particleCount: 200, spread: 180, startVelocity: 50, colors, origin: { x: .5, y: .6 }, scalar: 1.2 });
                setTimeout(() => confetti({ particleCount: 120, spread: 140, startVelocity: 35, colors, origin: { x: .2, y: .5 } }), 400);
                setTimeout(() => confetti({ particleCount: 120, spread: 140, startVelocity: 35, colors, origin: { x: .8, y: .5 } }), 700);
            }, 400);
        }

        function closeSurprise() {
            document.getElementById('surpriseModal').classList.remove('active');
            document.body.style.overflow = '';
            setTimeout(() => { modalOpen = false; }, 300);
        }

        function handleModalBg(e) {
            if (e.target === document.getElementById('surpriseModal') ||
                e.target.classList.contains('modal-backdrop')) closeSurprise();
        }

        function replayModal() {
            const el = document.getElementById('mTyped');
            const mc = document.getElementById('mCursor');
            el.innerHTML = ''; el.appendChild(mc);
            typeModal(surpriseMsg);
        }

        function typeModal(text) {
            const el = document.getElementById('mTyped');
            const mc = document.getElementById('mCursor');
            if (!el.contains(mc)) el.appendChild(mc);
            /* clear existing text nodes */
            [...el.childNodes].forEach(n => { if (n !== mc) el.removeChild(n); });
            let i = 0;
            const iv = setInterval(() => {
                if (i < text.length) { mc.insertAdjacentText('beforebegin', text[i]); i++; }
                else { clearInterval(iv); setTimeout(() => { try { mc.remove() } catch (e) { } }, 1200); }
            }, 34);
        }

        /* Particle burst around icon */
        function buildParticles() {
            const wrap = document.getElementById('burstRing');
            wrap.innerHTML = '';
            const colors = ['#ff4b6e', '#ffd166', '#a855f7', '#00e5ff', '#f472b6', '#fff'];
            const count = 16;
            for (let i = 0; i < count; i++) {
                const angle = (i / count) * 360;
                const dist = 60 + Math.random() * 30;
                const p = document.createElement('div');
                p.className = 'pb';
                p.style.background = colors[i % colors.length];
                p.style.boxShadow = `0 0 6px ${colors[i % colors.length]}`;
                const rad = angle * Math.PI / 180;
                const tx = Math.cos(rad) * dist;
                const ty = Math.sin(rad) * dist;
                p.style.setProperty('--tx', tx + 'px');
                p.style.setProperty('--ty', ty + 'px');
                p.style.animationName = 'particleFly';
                /* override to custom direction */
                p.style.cssText += `left:-3px;top:-3px;animation:none;`;
                /* animate manually */
                p.style.transition = `transform 1s ${0.3 + i * .03}s cubic-bezier(.2,.8,.3,1), opacity 1s ${0.3 + i * .03}s ease`;
                wrap.appendChild(p);
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        p.style.transform = `translate(${tx}px,${ty}px) scale(.2)`;
                        p.style.opacity = '0';
                    });
                });
            }
        }

        /* Click sparks */
        function spawnClickSparks(e) {
            const rect = (e.target.closest('.btn-surprise') || e.target).getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            ['✨', '💖', '🌸', '💫', '⭐'].forEach((em, i) => {
                const s = document.createElement('div');
                s.className = 'cspark'; s.textContent = em;
                s.style.left = cx + 'px'; s.style.top = cy + 'px';
                s.style.animationDelay = i * 70 + 'ms';
                document.body.appendChild(s);
                setTimeout(() => s.remove(), 800);
            });
        }

        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSurprise(); });
    </script>
</body>

</html>
